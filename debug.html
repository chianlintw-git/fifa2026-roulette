<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>診斷工具 v2</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .debug-page { max-width:700px; margin:40px auto; padding:0 16px; }
    .log-box { background:#1e1e1e; color:#d4d4d4; font-family:monospace; font-size:12px; padding:16px; border-radius:8px; min-height:200px; overflow-y:auto; margin-top:12px; line-height:1.8; white-space:pre-wrap; }
    .log-ok   { color:#4ec9b0; }
    .log-err  { color:#f48771; }
    .log-info { color:#9cdcfe; }
    .log-warn { color:#dcdcaa; }
  </style>
</head>
<body>
<div class="debug-page">
  <div class="card">
    <div class="card-title">🔍 診斷工具 v2</div>
    <div class="alert alert-warning">完成後請刪除此檔案。</div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px">
      <button class="btn btn-primary" onclick="runDiag()">① 基本診斷</button>
      <button class="btn btn-teal"    onclick="simLoadUsers()">② 模擬 loadUsers</button>
      <button class="btn btn-outline" onclick="clearLog()">清除</button>
    </div>
    <div class="log-box" id="log"><span class="log-info">▶ 按按鈕執行診斷...</span></div>
  </div>
</div>

<script type="module">
import { auth, db } from "./js/firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser = null;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists()) {
      currentUser = { ...snap.data(), uid: user.uid };
      log(`✓ 已登入：${currentUser.nickname} (${user.uid})`, "ok");
    }
  } else {
    log("❌ 未登入，請先至 index.html 登入", "err");
  }
});

function log(msg, type="info") {
  const box = document.getElementById("log");
  box.innerHTML += `\n<span class="log-${type}">${msg}</span>`;
  box.scrollTop = box.scrollHeight;
}
window.clearLog = () => { document.getElementById("log").innerHTML = ""; };

// ① 基本診斷
window.runDiag = async () => {
  clearLog();
  log("═══ 基本診斷 ═══", "info");
  try {
    const snap = await getDocs(collection(db, "users"));
    log(`users collection: ${snap.size} 筆`, "ok");
    snap.forEach(d => {
      const data = d.data();
      log(`  id=${d.id} | nickname=${data.nickname} | isAdmin=${data.isAdmin} | isApproved=${data.isApproved} | uid=${data.uid||"無"}`, "info");
    });
  } catch(e) {
    log(`❌ ${e.code}: ${e.message}`, "err");
  }
};

// ② 逐步模擬 loadUsers，找出哪一行出錯
window.simLoadUsers = async () => {
  clearLog();
  log("═══ 模擬 loadUsers 逐步執行 ═══", "info");

  // step 1: getDocs
  log("\n[step 1] getDocs users...", "info");
  let snap;
  try {
    snap = await getDocs(collection(db, "users"));
    log(`  ✓ 取得 ${snap.size} 筆`, "ok");
  } catch(e) {
    log(`  ❌ ${e.code}: ${e.message}`, "err"); return;
  }

  // step 2: 逐筆處理
  log("\n[step 2] 逐筆處理每個 document...", "info");
  const users = [];
  let i = 0;
  snap.forEach(d => {
    i++;
    try {
      if (d.id === "_schema") { log(`  [${i}] 跳過 _schema`, "warn"); return; }
      const data = d.data();
      const u = {
        id:         d.id,
        uid:        data.uid        || d.id,
        nickname:   data.nickname   || "（無暱稱）",
        email:      data.email      || "",
        isAdmin:    data.isAdmin    === true,
        isApproved: data.isApproved === true,
        userType:   data.userType   || "player"
      };
      users.push(u);
      log(`  [${i}] ✓ ${u.nickname} | admin=${u.isAdmin} | approved=${u.isApproved}`, "ok");
    } catch(e) {
      log(`  [${i}] ❌ 處理 doc ${d.id} 時出錯: ${e.message}`, "err");
    }
  });

  // step 3: sort
  log("\n[step 3] 排序...", "info");
  try {
    users.sort((a,b) => a.nickname.localeCompare(b.nickname, "zh-TW"));
    log(`  ✓ 排序完成，${users.length} 筆`, "ok");
  } catch(e) {
    log(`  ❌ 排序失敗: ${e.message}`, "err"); return;
  }

  // step 4: 產生每列 HTML
  log("\n[step 4] 逐列產生 HTML...", "info");
  users.forEach((u, idx) => {
    try {
      const isSelf = u.id === (currentUser?.uid);
      const row = `<tr><td>${u.nickname}</td><td>${u.email}</td><td>${u.isAdmin}</td></tr>`;
      log(`  [${idx+1}] ✓ ${u.nickname} (isSelf=${isSelf})`, "ok");
    } catch(e) {
      log(`  [${idx+1}] ❌ 產生 ${u.nickname} 列時出錯: ${e.message}`, "err");
    }
  });

  // step 5: 寫入 tbody
  log("\n[step 5] 寫入 tbody...", "info");
  try {
    const tbody = document.getElementById("log"); // 測試用，不寫入真實 tbody
    log("  ✓ getElementById 正常", "ok");
  } catch(e) {
    log(`  ❌ ${e.message}`, "err");
  }

  log("\n═══ 模擬完成 ═══", "info");
  log(`結論：成功處理 ${users.length} 筆，若以上全部 ✓ 代表 loadUsers 邏輯無誤`, "warn");
  log("若仍轉圈，問題可能在 admin.html 的 JS 其他部分造成 exception", "warn");
};
</script>
</body>
</html>
