<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>球隊戰績 — 2026世界盃足球輪盤盟主賽</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .round-section { margin-bottom:24px; }
    .round-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid var(--border); }
    .round-header h3 { font-size:15px; font-weight:500; margin:0; }
    .round-header .tc { font-size:12px; color:var(--text-sub); margin-left:auto; }
    .group-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
    .group-block { border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .group-block-hd { background:var(--bg2); padding:5px 10px; font-size:12px; font-weight:500; color:var(--text-sub); border-bottom:1px solid var(--border); }
    .group-team { display:flex; align-items:center; gap:8px; padding:7px 10px; font-size:13px; border-bottom:1px solid var(--bg2); }
    .group-team:last-child { border-bottom:none; }
    .group-team.adv { background:var(--teal-light); }
    .group-team.adv .tn { color:#085041; font-weight:500; }
    .group-team.elim { opacity:.4; }
    .mu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
    .mu-block { border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .mu-hd { background:var(--bg2); padding:4px 10px; font-size:11px; color:var(--text-sub); border-bottom:1px solid var(--border); }
    .mu-team { display:flex; align-items:center; gap:8px; padding:8px 10px; font-size:13px; border-bottom:1px solid var(--bg2); }
    .mu-team:last-child { border-bottom:none; }
    .mu-team.win { background:var(--teal-light); }
    .mu-team.win .tn { color:#085041; font-weight:500; }
    .mu-team.lose { opacity:.4; }
    .vs-div { text-align:center; font-size:10px; font-weight:500; color:var(--text-sub); padding:2px 0; background:var(--bg2); border-bottom:1px solid var(--border); }
    .pending { border:1.5px dashed var(--border); border-radius:var(--radius); padding:20px; text-align:center; color:var(--text-sub); font-size:13px; }
    .champ-block { text-align:center; padding:24px; background:linear-gradient(135deg,var(--primary-light),var(--teal-light)); border:2px solid var(--primary); border-radius:var(--radius-lg); }
    .champ-icon { font-size:40px; margin-bottom:8px; }
    .champ-name { font-size:20px; font-weight:500; color:var(--primary-dark); }
    .champ-sub  { font-size:13px; color:var(--text-sub); margin-top:4px; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand"><span class="flag">⚽</span><span>2026 輪盤盟主賽</span></div>
  <div class="navbar-nav">
    <span class="navbar-user" id="nav-nickname"></span>
    <a href="main.html">🏆 排行榜</a>
    <a href="bracket.html" class="active">📊 戰绩</a>
    <a href="pick.html">🎯 選隊</a>
    <a href="profile.html">👤 設定</a>
    <a href="admin.html" id="nav-admin" style="display:none">⚙️ 管理</a>
    <a href="#" onclick="doLogout()">🚪 登出</a>
  </div>
</nav>
<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <h2 style="font-size:17px;font-weight:500">📊 球隊戰绩</h2>
    <button class="btn btn-outline btn-sm" onclick="loadAll()">🔄 重新整理</button>
  </div>
  <div id="loading" class="loading"><div class="spinner"></div>載入中...</div>
  <div id="content" style="display:none"></div>
</div>
<script type="module">
import { auth, db } from "./js/firebase-config.js";
import { TEAMS, GROUPS } from "./js/teams-data.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "index.html"; return; }
  const snap = await getDoc(doc(db, "users", user.uid));
  if (!snap.exists() || !snap.data().isApproved) { await signOut(auth); window.location.href = "index.html"; return; }
  const u = { ...snap.data(), uid: user.uid };
  document.getElementById("nav-nickname").textContent = u.nickname;
  if (u.isAdmin) document.getElementById("nav-admin").style.display = "inline-flex";
  await loadAll();
});
window.doLogout = async () => { await signOut(auth); window.location.href = "index.html"; };

window.loadAll = async () => {
  document.getElementById("loading").style.display = "block";
  document.getElementById("content").style.display = "none";
  document.getElementById("content").innerHTML = "";
  try {
    const results = {};
    for (let i = 0; i <= 5; i++) {
      const s = await getDoc(doc(db, "results", String(i)));
      results[i] = s.exists() ? s.data() : { advancedTeams:[], matchups:[] };
    }
    const RL = ["","串強","十六強","八強","四強","冠軍決賽"];
    const RLF = ["","32強","十六強","八強","四強","冠軍決賽"];
    const TC  = ["","32←16隊","16←8隊","8←4隊","4←2隊","2隊决冠軍"];
    let html = "";

    // 第0輪小組賽
    const adv0 = new Set(results[0].advancedTeams || []);
    html += rh(0, "小組賽", "48←32隊",
      adv0.size > 0 ? bdg("teal", "已公布 " + adv0.size + " 隊晉級") : bdg("gray", "尚未公布"));
    if (!adv0.size) {
      html += pend("小組賽結果尚未公布");
    } else {
      html += "<div class='group-grid'>";
      GROUPS.forEach(g => {
        const ts = TEAMS.filter(t => t.group === g);
        html += "<div class='group-block'><div class='group-block-hd'>🔹 " + g + " 組</div>";
        ts.forEach(t => {
          const ok = adv0.has(t.teamId);
          html += "<div class='group-team " + (ok ? "adv" : "elim") + "'>" +
            "<span class='weighting-dot w" + t.weighting + "'>" + t.weighting + "</span>" +
            "<div><div class='tn team-name-cht'>" + t.nameCht + "</div>" +
            "<div style='font-size:11px;color:var(--text-sub)'>" + t.name + "</div></div>" +
            (ok ? "<span style='margin-left:auto;font-size:12px;color:var(--teal)'>✓</span>" : "") +
            "</div>";
        });
        html += "</div>";
      });
      html += "</div>";
    }
    html += "</div>";

    // 第1~5輪
    for (let n = 1; n <= 5; n++) {
      const mu   = results[n].matchups || [];
      const advN = new Set(results[n].advancedTeams || []);
      const sb   = advN.size > 0 ? bdg("teal", "已公布 " + advN.size + " 隊晉級")
                 : mu.length > 0 ? bdg("primary", "對戰組合已設定")
                 :                  bdg("gray", "尚未設定");
      html += rh(n, RLF[n], TC[n], sb);
      if (!mu.length) {
        html += pend("第" + n + "輪對戰組合尚未設定");
      } else if (n === 5 && advN.size > 0) {
        const cid  = [...advN][0];
        const ch   = TEAMS.find(t => t.teamId === cid);
        html += "<div class='champ-block'><div class='champ-icon'>🏆</div>" +
          "<div class='champ-name'>" + (ch ? ch.nameCht : cid) + "</div>" +
          "<div class='champ-sub'>" + (ch ? ch.name : "") + " — 2026 世界盃冠軍！</div></div>" +
          "<div style='margin-top:12px'><p style='font-size:13px;color:var(--text-sub);margin-bottom:8px'>决賽對戰：</p>" +
          "<div class='mu-grid'>";
        mu.forEach((p, i) => { html += mub(p, advN, i + 1); });
        html += "</div></div>";
      } else {
        html += "<div class='mu-grid'>";
        mu.forEach((p, i) => { html += mub(p, advN, i + 1); });
        html += "</div>";
      }
      html += "</div>";
    }

    document.getElementById("content").innerHTML = html;
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
  } catch(e) {
    document.getElementById("loading").innerHTML =
      "<div class='alert alert-danger'>❌ 載入失敗：" + e.message + "</div>";
  }
};

function rh(n, label, count, badgeHtml) {
  return "<div class='round-section'><div class='round-header'>" +
    "<h3>第 " + n + " 輪：" + label + "</h3>" +
    badgeHtml +
    "<span class='tc'>" + count + "</span></div>";
}
function bdg(t, tx) { return "<span class='badge badge-" + t + "'>" + tx + "</span>"; }
function pend(t)     { return "<div class='pending'>⏳ " + t + "</div>"; }
function mub(pair, advSet, idx) {
  const [idA, idB] = pair;
  const tA = TEAMS.find(t => t.teamId === idA) || { teamId:idA, nameCht:idA, name:idA, weighting:1 };
  const tB = TEAMS.find(t => t.teamId === idB) || { teamId:idB, nameCht:idB, name:idB, weighting:1 };
  const wA = advSet.has(idA), wB = advSet.has(idB);
  const cA = wA ? "win" : (wB ? "lose" : "");
  const cB = wB ? "win" : (wA ? "lose" : "");
  return "<div class='mu-block'>" +
    "<div class='mu-hd'>對戰組 " + idx + "</div>" +
    "<div class='mu-team " + cA + "'><span class='weighting-dot w" + tA.weighting + "'>" + tA.weighting + "</span>" +
    "<div><div class='tn team-name-cht'>" + tA.nameCht + "</div>" +
    "<div style='font-size:11px;color:var(--text-sub)'>" + tA.name + "</div></div>" +
    (wA ? "<span style='margin-left:auto;color:var(--teal)'>✓</span>" : "") + "</div>" +
    "<div class='vs-div'>VS</div>" +
    "<div class='mu-team " + cB + "'><span class='weighting-dot w" + tB.weighting + "'>" + tB.weighting + "</span>" +
    "<div><div class='tn team-name-cht'>" + tB.nameCht + "</div>" +
    "<div style='font-size:11px;color:var(--text-sub)'>" + tB.name + "</div></div>" +
    (wB ? "<span style='margin-left:auto;color:var(--teal)'>✓</span>" : "") + "</div></div>";
}
</script>
</body>
</html>
