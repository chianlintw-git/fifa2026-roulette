<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選隊 — 2026世界盃足球輪盤盟主賽</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .round-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
    .round-tab {
      padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight:500;
      border: 1.5px solid var(--border); background: var(--bg);
      cursor: pointer; color: var(--text-sub); transition: all .15s;
    }
    .round-tab:hover  { border-color: var(--primary); color: var(--primary); }
    .round-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .round-tab.closed { background: var(--bg2); color: var(--gray-400); cursor: default; }
    .round-tab.closed:hover { border-color: var(--border); color: var(--gray-400); }

    .group-section { margin-bottom: 20px; }
    .group-header {
      font-size: 13px; font-weight: 500; color: var(--text-sub);
      padding: 6px 10px; background: var(--bg2);
      border-radius: var(--radius); margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .group-counter { font-size: 12px; }
    .group-counter.ok    { color: var(--teal); }
    .group-counter.over  { color: var(--coral); }
    .group-counter.under { color: var(--amber); }

    .matchup-card {
      border: 1.5px solid var(--border); border-radius: var(--radius);
      overflow: hidden; margin-bottom: 10px;
    }
    .matchup-header {
      background: var(--bg2); padding: 6px 12px;
      font-size: 12px; color: var(--text-sub); font-weight:500;
    }
    .matchup-teams { display: grid; grid-template-columns: 1fr 1fr; }
    .matchup-team {
      padding: 10px 12px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: background .15s; border: none; background: var(--bg);
      text-align: left; width: 100%;
    }
    .matchup-team:first-child { border-right: 1px solid var(--border); }
    .matchup-team:hover { background: var(--primary-light); }
    .matchup-team.selected { background: var(--primary-light); }
    .matchup-team.selected .team-name-cht { color: var(--primary-dark); font-weight:500; }
    .matchup-team input[type="radio"] { accent-color: var(--primary); }

    .third-place-section {
      border: 1.5px dashed var(--border); border-radius: var(--radius);
      padding: 14px; margin-top: 8px;
    }
    .third-counter {
      font-size: 13px; font-weight:500; margin-bottom:10px;
      display: flex; align-items:center; gap:8px;
    }

    .sticky-footer {
      position: sticky; bottom: 0; background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px; display: flex;
      align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
      z-index: 50;
    }
    .save-status { font-size: 13px; color: var(--text-sub); }
    .save-status.ok   { color: var(--teal); }
    .save-status.err  { color: var(--coral); }
  </style>
</head>
<body>

<!-- 導覽列 -->
<nav class="navbar">
  <div class="navbar-brand">
    <span class="flag">⚽</span>
    <span>2026 輪盤盟主賽</span>
  </div>
  <div class="navbar-nav">
    <span class="navbar-user" id="nav-nickname"></span>
    <a href="main.html">🏆 排行榜</a>
    <a href="pick.html" class="active">🎯 選隊</a>
    <a href="profile.html">👤 設定</a>
    <a href="admin.html" id="nav-admin" style="display:none">⚙️ 管理</a>
    <a href="#" onclick="doLogout()">🚪 登出</a>
  </div>
</nav>

<div class="container" style="padding-bottom:80px">

  <!-- 輪次頁籤 -->
  <div id="round-tabs" class="round-tabs">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- 內容區 -->
  <div id="pick-content">
    <div class="loading"><div class="spinner"></div>載入中...</div>
  </div>

</div>

<!-- 底部儲存列 -->
<div class="sticky-footer" id="sticky-footer" style="display:none">
  <span class="save-status" id="save-status"></span>
  <button class="btn btn-primary" id="btn-save" onclick="savePicks()">
    ✓ 確定送出
  </button>
</div>

<script type="module">
import { auth, db } from "./js/firebase-config.js";
import { TEAMS, GROUPS } from "./js/teams-data.js";
import {
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, setDoc, getDocs,
  collection, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser  = null;
let currentRound = 0;
let rounds       = [];   // rounds collection 資料
let myPicks      = {};   // { "0": [...teamIds], "1": [...], ... }
let isClosed     = false;

// ─── 認證 ─────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "index.html"; return; }
  const snap = await getDoc(doc(db, "users", user.uid));
  if (!snap.exists() || !snap.data().isApproved) {
    await signOut(auth); window.location.href = "index.html"; return;
  }
  currentUser = snap.data();
  document.getElementById("nav-nickname").textContent = currentUser.nickname;
  if (currentUser.isAdmin) document.getElementById("nav-admin").style.display = "inline-flex";
  await loadAll();
});

window.doLogout = async () => { await signOut(auth); window.location.href = "index.html"; };

// ─── 載入全部資料 ──────────────────────────────────────
async function loadAll() {
  // 1. 讀取各輪狀態
  const roundsSnap = await getDocs(collection(db, "rounds"));
  rounds = [];
  roundsSnap.forEach(d => rounds.push(d.data()));
  rounds.sort((a,b) => a.round - b.round);

  // 2. 自動封盤判斷（前端時間比對）
  const now = new Date();
  rounds.forEach(r => {
    const due = r.dueDate?.toDate ? r.dueDate.toDate() : new Date(r.dueDate);
    if (now >= due) r.status = "close";
  });

  // 3. 讀取我的選擇
  for (let i = 0; i <= 5; i++) {
    const pickSnap = await getDoc(doc(db, "picks", `${currentUser.uid}_${i}`));
    myPicks[i] = pickSnap.exists() ? (pickSnap.data().selectedTeams || []) : [];
  }

  renderTabs();
  renderRound(currentRound);
}

// ─── 渲染輪次頁籤 ─────────────────────────────────────
function renderTabs() {
  const labels = ["小組賽","32強","16強","8強","4強","決賽"];
  const wrap   = document.getElementById("round-tabs");
  wrap.innerHTML = "";
  rounds.forEach(r => {
    const closed = r.status === "close";
    const btn = document.createElement("div");
    btn.className = `round-tab ${r.round === currentRound ? "active" : ""} ${closed ? "closed" : ""}`;
    btn.innerHTML = `第${r.round}輪 ${labels[r.round]} ${closed ? "🔒" : ""}`;
    if (!closed) btn.onclick = () => switchRound(r.round);
    else btn.title = "此輪已封盤";
    wrap.appendChild(btn);
  });
}

function switchRound(n) {
  currentRound = n;
  renderTabs();
  renderRound(n);
}

// ─── 渲染選隊內容 ─────────────────────────────────────
async function renderRound(n) {
  const content = document.getElementById("pick-content");
  const footer  = document.getElementById("sticky-footer");
  const round   = rounds.find(r => r.round === n);
  isClosed      = round?.status === "close";

  if (isClosed) {
    footer.style.display = "none";
    content.innerHTML = `
      <div class="card">
        <div class="alert alert-warning" style="margin-bottom:0">
          🔒 此輪已封盤，無法修改選擇。
        </div>
        ${myPicks[n]?.length > 0
          ? `<p style="font-size:13px;color:var(--text-sub);margin-top:12px">
               你已選擇 ${myPicks[n].length} 支隊伍。
             </p>`
          : `<p style="font-size:13px;color:var(--coral);margin-top:12px">
               ⚠ 封盤前未完成選隊，本輪不計分。
             </p>`}
      </div>`;
    if (n === 0) renderRound0View(content);
    else renderKnockoutView(content, n);
    return;
  }

  footer.style.display = "flex";
  document.getElementById("save-status").textContent = "";
  document.getElementById("save-status").className   = "save-status";

  if (n === 0) await renderRound0(content);
  else         await renderKnockout(content, n);
}

// ─── 第 0 輪：小組賽 ──────────────────────────────────
async function renderRound0(content) {
  const selected = new Set(myPicks[0] || []);

  let html = `
    <div class="card">
      <div class="card-title">🏟 第 0 輪：小組賽選隊</div>
      <div class="alert alert-info">
        每組選 <strong>2 隊</strong>晉級（共 24 隊），再從各組第三名中選 <strong>8 隊</strong>，合計 32 隊。
      </div>
    </div>`;

  // A~L 各組
  GROUPS.forEach(g => {
    const teams = TEAMS.filter(t => t.group === g);
    const groupSelected = teams.filter(t => selected.has(t.teamId));
    const cnt = groupSelected.length;
    const counterClass = cnt === 2 ? "ok" : cnt > 2 ? "over" : "under";

    html += `<div class="group-section">
      <div class="group-header">
        <span>🔹 ${g} 組</span>
        <span class="group-counter ${counterClass}">${cnt}/2 隊</span>
      </div>
      <div class="team-grid">`;

    teams.forEach(t => {
      const sel = selected.has(t.teamId);
      html += `
        <div class="team-card ${sel ? "selected" : ""}" onclick="toggleTeam0('${t.teamId}')">
          <input type="checkbox" ${sel ? "checked" : ""} onclick="event.stopPropagation()">
          <span class="weighting-dot w${t.weighting}">${t.weighting}</span>
          <div>
            <div class="team-name-cht">${t.nameCht}</div>
            <div class="team-name-en">${t.name}</div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });

  // 第三名區域
  const thirdCandidates = TEAMS.filter(t => {
    // 各組第三名候選（排名第3的隊伍，此處顯示所有隊伍讓使用者自行判斷）
    const groupTeams = TEAMS.filter(gt => gt.group === t.group);
    return groupTeams.indexOf(t) === 2; // weighting table 第3筆即第三名候選
  });
  const thirdSelected = thirdCandidates.filter(t => selected.has(t.teamId));

  html += `
    <div class="card">
      <div class="card-title">🔸 各組第三名選拔（選 8 隊）</div>
      <div class="alert alert-info" style="margin-bottom:12px">
        從 12 組第三名中選出 <strong>8 隊</strong>晉級。
      </div>
      <div class="third-place-section">
        <div class="third-counter">
          已選 <strong id="third-count">${thirdSelected.length}</strong> / 8 隊
          <span id="third-status" class="${thirdSelected.length === 8 ? "badge badge-teal" : "badge badge-amber"}">
            ${thirdSelected.length === 8 ? "✓ 完成" : "未完成"}
          </span>
        </div>
        <div class="team-grid">`;

  thirdCandidates.forEach(t => {
    const sel = selected.has(t.teamId);
    html += `
      <div class="team-card ${sel ? "selected" : ""}" onclick="toggleThird('${t.teamId}')">
        <input type="checkbox" ${sel ? "checked" : ""} onclick="event.stopPropagation()">
        <span class="weighting-dot w${t.weighting}">${t.weighting}</span>
        <div>
          <div class="team-name-cht">${t.nameCht} <small style="color:var(--text-sub)">(${t.group}組)</small></div>
          <div class="team-name-en">${t.name}</div>
        </div>
      </div>`;
  });

  html += `</div></div></div>`;
  content.innerHTML = html;
}

// ─── 第 1~5 輪：淘汰賽 ────────────────────────────────
async function renderKnockout(content, n) {
  const resultSnap = await getDoc(doc(db, "results", String(n)));
  const matchups   = resultSnap.exists() ? (resultSnap.data().matchups || []) : [];
  const selected   = new Set(myPicks[n] || []);
  const labels     = ["","32強","16強","8強","4強","冠軍決賽"];

  if (matchups.length === 0) {
    content.innerHTML = `
      <div class="card">
        <div class="card-title">🎯 第 ${n} 輪：${labels[n]}選隊</div>
        <div class="alert alert-warning">
          ⏳ 管理員尚未設定本輪對戰組別，請稍後再來。
        </div>
      </div>`;
    document.getElementById("sticky-footer").style.display = "none";
    return;
  }

  let html = `
    <div class="card">
      <div class="card-title">🎯 第 ${n} 輪：${labels[n]}選隊</div>
      <div class="alert alert-info">
        每組對戰選 <strong>1 隊</strong>晉級，共選 ${matchups.length} 隊。
      </div>
    </div>`;

  matchups.forEach((matchup, idx) => {
    const [idA, idB] = matchup;
    const teamA = TEAMS.find(t => t.teamId === idA) || { teamId:idA, nameCht:idA, name:idA, weighting:1 };
    const teamB = TEAMS.find(t => t.teamId === idB) || { teamId:idB, nameCht:idB, name:idB, weighting:1 };
    const selA  = selected.has(idA);
    const selB  = selected.has(idB);

    html += `
      <div class="matchup-card">
        <div class="matchup-header">對戰組 ${idx + 1}</div>
        <div class="matchup-teams">
          <button class="matchup-team ${selA ? "selected" : ""}" onclick="selectKnockout(${n}, '${idA}', '${idB}')">
            <input type="radio" name="match_${n}_${idx}" ${selA ? "checked" : ""} onclick="event.stopPropagation()">
            <span class="weighting-dot w${teamA.weighting}">${teamA.weighting}</span>
            <div>
              <div class="team-name-cht">${teamA.nameCht}</div>
              <div class="team-name-en">${teamA.name}</div>
            </div>
          </button>
          <button class="matchup-team ${selB ? "selected" : ""}" onclick="selectKnockout(${n}, '${idB}', '${idA}')">
            <input type="radio" name="match_${n}_${idx}" ${selB ? "checked" : ""} onclick="event.stopPropagation()">
            <span class="weighting-dot w${teamB.weighting}">${teamB.weighting}</span>
            <div>
              <div class="team-name-cht">${teamB.nameCht}</div>
              <div class="team-name-en">${teamB.name}</div>
            </div>
          </button>
        </div>
      </div>`;
  });

  content.innerHTML = html;
}

// ─── 已封盤時的唯讀顯示 ───────────────────────────────
function renderRound0View(content) {
  const selected = new Set(myPicks[0] || []);
  if (selected.size === 0) return;
  let extra = `<div class="card" style="margin-top:8px">
    <div class="card-title">你的選擇</div>
    <div class="team-grid">`;
  selected.forEach(id => {
    const t = TEAMS.find(t => t.teamId === id);
    if (!t) return;
    extra += `<div class="team-card selected" style="cursor:default">
      <span class="weighting-dot w${t.weighting}">${t.weighting}</span>
      <div><div class="team-name-cht">${t.nameCht}</div>
           <div class="team-name-en">${t.name}</div></div>
    </div>`;
  });
  extra += `</div></div>`;
  content.innerHTML += extra;
}

function renderKnockoutView(content, n) {
  const selected = new Set(myPicks[n] || []);
  if (selected.size === 0) return;
  let extra = `<div class="card" style="margin-top:8px">
    <div class="card-title">你的選擇</div>
    <div class="team-grid">`;
  selected.forEach(id => {
    const t = TEAMS.find(t => t.teamId === id);
    if (!t) return;
    extra += `<div class="team-card selected" style="cursor:default">
      <span class="weighting-dot w${t.weighting}">${t.weighting}</span>
      <div><div class="team-name-cht">${t.nameCht}</div>
           <div class="team-name-en">${t.name}</div></div>
    </div>`;
  });
  extra += `</div></div>`;
  content.innerHTML += extra;
}

// ─── 選隊互動：第 0 輪各組 ────────────────────────────
window.toggleTeam0 = (teamId) => {
  const selected = new Set(myPicks[0] || []);
  const team     = TEAMS.find(t => t.teamId === teamId);
  const groupTeams = TEAMS.filter(t => t.group === team.group);
  const groupSelected = groupTeams.filter(t => selected.has(t.teamId));

  if (selected.has(teamId)) {
    selected.delete(teamId);
  } else {
    if (groupSelected.length >= 2) {
      setStatus("每組最多選 2 隊，請先取消同組的選擇。", "err"); return;
    }
    selected.add(teamId);
  }
  myPicks[0] = [...selected];
  renderRound0(document.getElementById("pick-content"));
  setStatus("", "");
};

// ─── 選隊互動：第三名 ─────────────────────────────────
window.toggleThird = (teamId) => {
  const selected = new Set(myPicks[0] || []);
  if (selected.has(teamId)) {
    selected.delete(teamId);
  } else {
    const thirdCandidates = TEAMS.filter((t, _, arr) => {
      return arr.filter(gt => gt.group === t.group).indexOf(t) === 2;
    });
    const thirdSelected = thirdCandidates.filter(t => selected.has(t.teamId));
    if (thirdSelected.length >= 8) {
      setStatus("第三名最多選 8 隊，請先取消其中一隊。", "err"); return;
    }
    selected.add(teamId);
  }
  myPicks[0] = [...selected];
  renderRound0(document.getElementById("pick-content"));
  setStatus("", "");
};

// ─── 選隊互動：淘汰賽 ─────────────────────────────────
window.selectKnockout = (round, pickId, otherId) => {
  const selected = new Set(myPicks[round] || []);
  selected.delete(otherId);
  if (selected.has(pickId)) selected.delete(pickId);
  else selected.add(pickId);
  myPicks[round] = [...selected];
  renderKnockout(document.getElementById("pick-content"), round);
  setStatus("", "");
};

// ─── 儲存 ─────────────────────────────────────────────
window.savePicks = async () => {
  const btn      = document.getElementById("btn-save");
  const n        = currentRound;
  const selected = myPicks[n] || [];

  // 驗證第 0 輪
  if (n === 0) {
    const thirdCandidates = TEAMS.filter((t, _, arr) =>
      arr.filter(gt => gt.group === t.group).indexOf(t) === 2
    );
    const thirdSelected = thirdCandidates.filter(t => selected.includes(t.teamId));
    let groupError = false;
    GROUPS.forEach(g => {
      const groupTeams = TEAMS.filter(t => t.group === g);
      const cnt = groupTeams.filter(t => selected.includes(t.teamId)).length;
      if (cnt !== 2) groupError = true;
    });
    if (groupError) {
      setStatus("❌ 每組必須選恰好 2 隊，請確認各組選擇。", "err"); return;
    }
    if (thirdSelected.length !== 8) {
      setStatus(`❌ 第三名需選 8 隊，目前選了 ${thirdSelected.length} 隊。`, "err"); return;
    }
  } else {
    // 驗證淘汰賽：每組至少選 1 隊
    const resultSnap = await getDoc(doc(db, "results", String(n)));
    const matchups   = resultSnap.exists() ? (resultSnap.data().matchups || []) : [];
    if (selected.length !== matchups.length) {
      setStatus(`❌ 共 ${matchups.length} 組對戰，請每組各選 1 隊（目前選了 ${selected.length} 隊）。`, "err"); return;
    }
  }

  btn.disabled    = true;
  btn.textContent = "儲存中...";
  setStatus("儲存中...", "");

  try {
    await setDoc(doc(db, "picks", `${currentUser.uid}_${n}`), {
      uid:           currentUser.uid,
      round:         n,
      selectedTeams: selected,
      submittedAt:   serverTimestamp()
    });
    setStatus("✓ 儲存成功！", "ok");
  } catch (e) {
    setStatus("❌ 儲存失敗：" + e.message, "err");
  }

  btn.disabled    = false;
  btn.textContent = "✓ 確定送出";
};

function setStatus(msg, type) {
  const el = document.getElementById("save-status");
  el.textContent = msg;
  el.className   = `save-status ${type}`;
}
</script>

</body>
</html>
